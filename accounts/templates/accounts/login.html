{% extends "auth_base.html" %}

{% block title %}Login{% endblock %}

{% block auth_content %}
<section class="auth-card">
  <p class="eyebrow">Painel do lojista</p>
  <h1>Acessar sistema</h1>
  <form method="post" class="form-shell form-shell-compact">
    {% csrf_token %}
    {% include "includes/form_fields.html" with form=form %}
    <div class="form-actions">
      <button type="submit" class="button">Entrar</button>
    </div>
  </form>
  <p class="auth-help">Use o usuario da equipe local para acessar o painel.</p>
</section>
{% endblock %}
